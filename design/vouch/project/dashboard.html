<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vouch — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0b0b;
    --bg1: #111111;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #252525;
    --border2: #2e2e2e;
    --text: #e2e2e2;
    --text2: #888;
    --text3: #555;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-dim2: rgba(200,241,53,0.06);
    --red: #f04444;
    --red-dim: rgba(240,68,68,0.12);
    --yellow: #f5a623;
    --yellow-dim: rgba(245,166,35,0.12);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.5; }

  #root { height: 100%; display: flex; flex-direction: column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Topnav */
  .topnav {
    height: 44px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 0;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-right: 12px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo-mark {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 12px; height: 12px; }
  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .nav-divider { width: 1px; height: 20px; background: var(--border); margin: 0 12px; }

  .project-switcher {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .project-switcher:hover { border-color: var(--border2); background: var(--bg2); }
  .project-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .project-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .project-chevron { color: var(--text3); font-size: 10px; }

  .project-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    min-width: 200px;
    padding: 4px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .project-dropdown-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
  }
  .project-dropdown-item:hover { background: var(--bg3); color: var(--text); }
  .project-dropdown-item.active { color: var(--text); }
  .project-dropdown-item .pdot { width: 6px; height: 6px; border-radius: 50%; }

  .topnav-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: 8px;
  }
  .nav-item {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 400;
    color: var(--text2);
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .nav-item:hover { color: var(--text); background: var(--bg2); }
  .nav-item.active { color: var(--text); background: var(--bg2); }

  .topnav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--text2);
    cursor: pointer;
    overflow: hidden;
  }
  .avatar-img { width: 100%; height: 100%; object-fit: cover; }

  /* Main */
  .main { flex: 1; overflow-y: auto; }
  .content { padding: 24px 24px; max-width: 1200px; }

  /* Page header */
  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .page-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.03em; }
  .stat-delta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .stat-delta.up { color: var(--accent); }
  .stat-delta.down { color: var(--red); }

  /* Section */
  .section { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .section-action { font-size: 11px; color: var(--text3); cursor: pointer; transition: color 0.15s; }
  .section-action:hover { color: var(--accent); }

  /* Feed */
  .feed-row {
    display: grid;
    grid-template-columns: 28px 1fr 100px 80px 70px 60px 70px;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .feed-row:last-child { border-bottom: none; }
  .feed-row:hover { background: var(--bg2); }
  .feed-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .feed-main { min-width: 0; }
  .feed-branch { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
  .feed-commit { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-project { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-outcome { display: flex; justify-content: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; white-space: nowrap; }
  .badge.pass { background: rgba(200,241,53,0.1); color: var(--accent); border: 1px solid rgba(200,241,53,0.2); }
  .badge.flagged { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,68,68,0.2); }
  .badge.never { background: rgba(85,85,85,0.15); color: var(--text3); border: 1px solid rgba(85,85,85,0.25); }
  .confidence { font-family: var(--mono); font-size: 11px; text-align: right; }
  .feed-ts { font-size: 11px; color: var(--text3); text-align: right; white-space: nowrap; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 9px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text2); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: var(--bg2); }
  tbody tr.flagged-row { background: rgba(240,68,68,0.03); }
  tbody tr.flagged-row:hover { background: rgba(240,68,68,0.06); }
  tbody tr.never-row { opacity: 0.65; }

  .sha { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--bg3); padding: 2px 6px; border-radius: 4px; display: inline-block; }
  .branch-name { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .commit-msg { font-size: 12px; color: var(--text2); max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dev-chip { display: flex; align-items: center; gap: 6px; }
  .mini-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; }

  /* Filter bar */
  .filter-bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .filter-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text);
    outline: none;
    max-width: 260px;
  }
  .filter-input::placeholder { color: var(--text3); }
  .filter-input:focus { border-color: var(--border2); }
  .filter-chip {
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .filter-chip:hover { color: var(--text2); border-color: var(--border); }
  .filter-chip.active { color: var(--text); background: var(--bg3); border-color: var(--border2); }

  /* Dev cards */
  .dev-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; padding: 12px; }
  .dev-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .dev-card:hover { border-color: var(--border2); }
  .dev-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .dev-card-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .dev-card-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .dev-card-handle { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .dev-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .dev-stat-item { }
  .dev-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .dev-stat-val { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .dev-stat-sub { font-size: 10px; color: var(--text3); }

  /* Sparkline */
  .sparkline { width: 100%; height: 28px; }

  /* Session detail */
  .session-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .session-meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 12px; }
  .meta-item { }
  .meta-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .meta-val { font-size: 12px; color: var(--text); }
  .meta-val.mono { font-family: var(--mono); }

  .session-qa { padding: 16px 20px; }
  .qa-pair { margin-bottom: 16px; }
  .q-block {
    display: flex; gap: 10px; margin-bottom: 6px;
  }
  .q-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; width: 16px; flex-shrink: 0; padding-top: 2px; }
  .q-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .a-block { display: flex; gap: 10px; }
  .a-label { font-size: 10px; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; width: 16px; flex-shrink: 0; padding-top: 2px; }
  .a-text {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.65;
    flex: 1;
    position: relative;
  }
  .a-score {
    position: absolute;
    top: 8px; right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .a-score.good { color: var(--accent); }
  .a-score.mid { color: var(--yellow); }
  .a-score.bad { color: var(--red); }

  .flag-banner {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--red-dim);
    border: 1px solid rgba(240,68,68,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 0 20px 16px;
  }
  .flag-icon { color: var(--red); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .flag-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .flag-title { font-size: 12px; font-weight: 500; color: var(--red); margin-bottom: 2px; }

  .notes-field {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text);
    resize: vertical;
    width: 100%;
    outline: none;
    min-height: 60px;
    margin: 0 0 4px;
  }
  .notes-field:focus { border-color: var(--border2); }
  .notes-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text3);
    cursor: pointer; margin-bottom: 14px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }

  /* Settings */
  .settings-grid { display: grid; grid-template-columns: 200px 1fr; gap: 0; min-height: 400px; }
  .settings-sidebar { border-right: 1px solid var(--border); padding: 8px; }
  .settings-nav-item { padding: 6px 10px; border-radius: 5px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.1s; margin-bottom: 1px; }
  .settings-nav-item:hover { color: var(--text); background: var(--bg2); }
  .settings-nav-item.active { color: var(--text); background: var(--bg2); }
  .settings-content { padding: 16px 20px; }
  .settings-section { margin-bottom: 24px; }
  .settings-section-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .settings-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 8px 10px; background: var(--bg2); border-radius: 6px; }
  .settings-row-label { font-size: 12px; color: var(--text); }
  .settings-row-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .settings-control { display: flex; align-items: center; gap: 8px; }

  .toggle {
    width: 32px; height: 18px; border-radius: 9px; background: var(--bg3);
    border: 1px solid var(--border2); position: relative; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%; background: var(--text3);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on .toggle-thumb { transform: translateX(14px); background: #0b0b0b; }

  .select-ctrl {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text);
    font-family: var(--sans);
    cursor: pointer;
    outline: none;
  }

  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    border: none;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0b0b0b; }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

  /* Confidence color */
  .conf-high { color: var(--accent); }
  .conf-mid { color: var(--yellow); }
  .conf-low { color: var(--red); }

  /* Empty */
  .empty { padding: 32px; text-align: center; color: var(--text3); font-size: 12px; }

  /* Diff summary */
  .diff-summary { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.7; overflow-x: auto; }
  .diff-add { color: var(--accent); }
  .diff-del { color: var(--red); }
  .diff-ctx { color: var(--text3); }

  /* Status dot */
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pass { background: var(--accent); box-shadow: 0 0 4px rgba(200,241,53,0.5); }
  .status-dot.flagged { background: var(--red); box-shadow: 0 0 4px rgba(240,68,68,0.5); }
  .status-dot.never { background: var(--text3); }

  .sort-indicator { color: var(--accent); margin-left: 3px; }

  .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg2); border-radius: 6px; margin-bottom: 6px; }
  .member-info { flex: 1; }
  .member-name { font-size: 12px; color: var(--text); }
  .member-role { font-size: 10px; color: var(--text3); }
  .member-remove { font-size: 11px; color: var(--text3); cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
  .member-remove:hover { color: var(--red); background: var(--red-dim); }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ────────────────────────────────────────────────────────────────────

const DEVS = [

  { id: 2, name: "Sara Chen",    handle: "sarachen",   initials: "SC", color: "#f7a06a" },

  { id: 5, name: "Rui Tanaka",   handle: "ruitanaka",  initials: "RT", color: "#6af7c8" },

const SESSIONS = [
  { id: "s1",  devId: 1, branch: "feat/auth-refactor",        sha: "a1b2c3d", msg: "Refactor JWT auth flow and add refresh token support", project: "api-service",   outcome: "flagged", confidence: 52, ts: "2m ago",  duration: "4m 12s", model: "claude-3-7-sonnet", flagReason: "Developer could not explain the token expiry logic or why the old approach was replaced." },

function devAudits(devId) { return SESSIONS.filter(s => s.devId === devId); }
function devPassRate(devId) {
  const a = devAudits(devId);
  if (!a.length) return 0;
  return Math.round((a.filter(s => s.outcome === "pass").length / a.length) * 100);
}
function devAvgConf(devId) {
  const a = devAudits(devId);
  if (!a.length) return 0;
  return Math.round(a.reduce((sum, s) => sum + s.confidence, 0) / a.length);
}

// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function ConfValue({ v }) {
  const cls = v >= 80 ? "conf-high" : v >= 65 ? "conf-mid" : "conf-low";
  return <span className={`confidence ${cls}`}>{v}%</span>;
}

function DevAvatar({ dev, size = 26, fontSize = 11 }) {
  return (
    <div className="feed-avatar" style={{ width: size, height: size, background: dev.color + "26", border: `1px solid ${dev.color}40`, color: dev.color, fontSize }}>
      {dev.initials}
    </div>
  );
}

function Sparkline({ data }) {
  const w = 100, h = 24, dotW = 5, gap = (w - dotW * 14) / 13;
  return (
    <svg className="sparkline" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {data.map((v, i) => {
        const x = i * (dotW + gap);
        const fill = v === 1 ? "var(--accent)" : "var(--red)";
        return <rect key={i} x={x} y={v === 1 ? 6 : 6} width={dotW} height={v === 1 ? 12 : 12} rx="2" fill={fill} opacity={v === 1 ? 0.6 : 0.8} />;
      })}
    </svg>
  );
}

function Toggle({ on, onToggle }) {
  return (
    <div className={`toggle ${on ? "on" : ""}`} onClick={onToggle}>
      <div className="toggle-thumb" />
    </div>
  );
}

function Branches({ onSelectSession, tweaks }) {
  const [filter, setFilter] = useState("");

  const [sortDir, setSortDir] = useState(1);
  const [projectFilter, setProjectFilter] = useState("all");

  function handleSort(col) {
    if (sortCol === col) setSortDir(d => -d);
    else { setSortCol(col); setSortDir(1); }
  }

  const filtered = BRANCHES
    .filter(b => {
      if (outcomeFilter !== "all" && b.outcome !== outcomeFilter) return false;
      if (projectFilter !== "all" && b.project !== projectFilter) return false;
      if (filter && !b.name.toLowerCase().includes(filter.toLowerCase()) && !b.msg.toLowerCase().includes(filter.toLowerCase())) return false;
      return true;
    })
    .sort((a, b) => {
      if (sortCol === "name") return sortDir * a.name.localeCompare(b.name);
      if (sortCol === "outcome") return sortDir * a.outcome.localeCompare(b.outcome);
      if (sortCol === "project") return sortDir * a.project.localeCompare(b.project);
      return 0;
    });

            <div className="meta-item"><div className="meta-label">Commit</div><div className="meta-val mono" style={{ color: "var(--accent)", cursor: "pointer" }}>{s.sha} ↗</div></div>
            <div className="meta-item"><div className="meta-label">Project</div><div className="meta-val">{s.project}</div></div>
            <div className="meta-item"><div className="meta-label">Model</div><div className="meta-val mono">{s.model}</div></div>
            <div className="meta-item"><div className="meta-label">Duration</div><div className="meta-val">{s.duration}</div></div>
            <div className="meta-item"><div className="meta-label">Confidence</div><div className="meta-val"><ConfValue v={s.confidence} /></div></div>
            <div className="meta-item"><div className="meta-label">Timestamp</div><div className="meta-val">{s.ts}</div></div>
          </div>
        </div>

        {qa.length > 0 && (
          <div className="session-qa">
            <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 14, fontWeight: 500 }}>Interview transcript</div>
            {qa.map((pair, i) => (
              <div key={i} className="qa-pair">
                <div className="q-block">
                  <div className="q-label" style={{ color: "var(--text3)" }}>Q</div>
                  <div className="q-text">{pair.q}</div>
                </div>
                <div className="a-block">
                  <div className="a-label">A</div>
                  <div className="a-text">
                    {pair.a}
                    <span className={`a-score ${scoreClass(pair.score)}`}>{pair.score}%</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{ padding: "0 20px 16px" }}>
          <div className="notes-label">Manager notes</div>
          <textarea className="notes-field" placeholder="Add a note for this session…" value={notes} onChange={e => setNotes(e.target.value)} />
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <button className="btn btn-primary" style={{ fontSize: 11 }}>Save note</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function CreateTeamScreen({ onDone }) {
  const [step, setStep] = useState(1); // 1 = team info, 2 = invite, 3 = install CLI
  const [teamName, setTeamName] = useState("");
  const [slug, setSlug] = useState("");
  const [invites, setInvites] = useState(["", ""]);
  const [copied, setCopied] = useState(false);

  function handleTeamName(v) {
    setTeamName(v);
    setSlug(v.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, ""));
  }

  function addInvite() { setInvites(i => [...i, ""]); }
  function setInvite(idx, val) { setInvites(i => i.map((v, j) => j === idx ? val : v)); }

  function handleCopy() {
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }

  const cliCmd = `npm install -g vouch-cli && vouch init --team ${slug || "my-team"}`;

  const STEPS = ["Team details", "Invite developers", "Install CLI"];

  return (
    <div style={{
      minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: 24,
    }}>
      <div style={{

              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <button className="btn btn-primary" style={{ width: "100%", padding: "9px", fontSize: 13, borderRadius: 8 }} onClick={onDone}>
                  Open dashboard →
                </button>
                <button className="btn btn-ghost" style={{ width: "100%", padding: "9px", fontSize: 13, borderRadius: 8 }} onClick={onDone}>
                  I'll set this up later
                </button>
              </div>
            </>
          )}
        </div>

        {step > 1 && (
          <div style={{ textAlign: "center", marginTop: 12 }}>
            <span className="back-btn" style={{ fontSize: 11 }} onClick={() => setStep(s => s - 1)}>← Back</span>
          </div>
        )}
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "feedRows": 8,
  "showConfidence": true,
  "compactRows": false,
  "accentColor": "#c8f135"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [appState, setAppState] = useState("login"); // login | createteam | dashboard
  const [view, setView] = useState("overview");
  const [selectedSession, setSelectedSession] = useState(null);
  const [selectedDev, setSelectedDev] = useState(null);
  const [activeProject, setActiveProject] = useState(PROJECTS[0]);
  const [showProjectDropdown, setShowProjectDropdown] = useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", tweaks.accentColor);
  }, [tweaks.accentColor]);

  if (appState === "login") return <LoginScreen onLogin={() => setAppState("createteam")} />;
  if (appState === "createteam") return <CreateTeamScreen onDone={() => setAppState("dashboard")} />;

  function handleSelectSession(id) {
    setSelectedSession(id);
    setView("session");
  }
  function handleSelectDev(id) {
    setSelectedDev(id);
    setView("devdetail");
  }
  function handleBack() {
    if (view === "session") setView(selectedDev ? "devdetail" : "overview");
    else if (view === "devdetail") { setSelectedDev(null); setView("developers"); }
  }

  const navItems = [
    { id: "overview",    label: "Overview" },
    { id: "branches",    label: "Branches" },
    { id: "developers",  label: "Developers" },
    { id: "settings",    label: "Settings" },
  ];

  return (
    <React.Fragment>
      <div id="root-inner" style={{ height: "100vh", display: "flex", flexDirection: "column" }}>
        {/* Top nav */}
        <nav className="topnav">
          <div className="logo" onClick={() => setView("overview")}>
            <div className="logo-mark">
              <svg viewBox="0 0 12 12" fill="none">
                <path d="M6 1L10.5 4v4L6 11 1.5 8V4L6 1z" fill="#0b0b0b" />
              </svg>
            </div>
            <span className="logo-text">vouch</span>
          </div>

          <div className="nav-divider" />

          <div className="project-switcher" onClick={() => setShowProjectDropdown(v => !v)}>
            <div className="project-dot" style={{ background: activeProject.color }} />
            <span className="project-name">{activeProject.name}</span>
            <span className="project-chevron">▾</span>
            {showProjectDropdown && (
              <div className="project-dropdown">
                {PROJECTS.map(p => (
                  <div key={p.id} className={`project-dropdown-item ${activeProject.id === p.id ? "active" : ""}`} onClick={e => { e.stopPropagation(); setActiveProject(p); setShowProjectDropdown(false); }}>
                    <div className="pdot" style={{ background: p.color }} />
                    {p.name}
                    {activeProject.id === p.id && <span style={{ marginLeft: "auto", fontSize: 10, color: "var(--accent)" }}>✓</span>}
                  </div>
                ))}
              </div>
            )}
          </div>

          <nav className="topnav-nav">
            {navItems.map(n => (
              <div key={n.id} className={`nav-item ${(view === n.id || (view === "session" && n.id === "overview") || (view === "devdetail" && n.id === "developers")) ? "active" : ""}`} onClick={() => { setView(n.id); setSelectedSession(null); setSelectedDev(null); }}>
                {n.label}
              </div>
            ))}
          </nav>

          <div className="topnav-right">
            <div className="avatar" title="You">
              <span>YO</span>
            </div>
          </div>
        </nav>

        {/* Main */}
        <div className="main">
          {view === "overview" && <Overview onSelectSession={handleSelectSession} tweaks={tweaks} />}
          {view === "branches" && <Branches onSelectSession={handleSelectSession} tweaks={tweaks} />}
          {view === "developers" && <Developers onSelectDev={handleSelectDev} />}
          {view === "devdetail" && <DevDetail devId={selectedDev} onBack={handleBack} onSelectSession={handleSelectSession} />}
          {view === "session" && <SessionDetail sessionId={selectedSession} onBack={handleBack} />}
          {view === "settings" && <SettingsView />}
        </div>

        {/* Tweaks panel */}
        <TweaksPanel title="Tweaks">
          <TweakSlider label="Feed rows" value={tweaks.feedRows} min={3} max={10} step={1} onChange={v => setTweak("feedRows", v)} />
          <TweakToggle label="Show confidence scores" value={tweaks.showConfidence} onChange={v => setTweak("showConfidence", v)} />
          <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v => setTweak("accentColor", v)} />
        </TweaksPanel>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
